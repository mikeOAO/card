<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我有問題</title>
  <link rel="stylesheet" href="../style.css">
  <link rel="Shortcut icon" href="../logo.ico" type="image/x-icon"/>
  <script src="../json.js"></script>

  <style>
    .time-text {
      display: block;
      font-size: 40px;
    }
  </style>
</head>

<body> 

<div class="grid">
  <a href="#" class="card" onclick="toggleSelect(event,this); startTime(event,this)">
    <img src="../img/info1.png" class="card-img">
    <p id="current-time" class="time-text">現在幾點</p>
  </a>

  <a href="#" class="card" onclick="changeText(event,this);toggleSelect(event,this)">
    <img src="../img/info2.png" class="card-img">
    <p class="location-text">我在哪裡</p>
  </a>

  <a href="#" class="card" onclick="toggleSelect(event,this)">
    <img src="../img/info3.png" class="card-img">
    <p>今天要做甚麼</p>
  </a>
</div>

<div class="button-container">
  <button class="btn btn-home" onclick="window.location.href='../index.html'">返回首頁</button>
</div>

<script>
function updateTime() {
  const now = new Date();

  let hours = now.getHours();
  const minutes = String(now.getMinutes()).padStart(2, '0');

  const period = hours >= 12 ? '下午' : '上午';
  hours = hours % 12 || 12;

  const timeString = `${period} ${hours}:${minutes}`;

  document.getElementById("current-time").textContent = timeString;
}

let timerStarted = false;
let timer = null;

function startTime(event, element) {
  event.preventDefault();

  const text = document.getElementById("current-time");

  if (!timerStarted) {
    // 開始顯示時間
    timerStarted = true;

    updateTime();
    timer = setInterval(updateTime, 1000);

  } else {
    // 取消 → 停止時間，恢復文字x
    timerStarted = false;

    clearInterval(timer);
    timer = null;

    text.textContent = "現在幾點";
  }
}

function changeText(event, element) {
  event.preventDefault();

  const text = element.querySelector(".location-text");

  if (text.textContent === "我在哪裡") {
    text.textContent = "加護病房";
  } else {
    text.textContent = "我在哪裡";
  }
}

</script>

</body>
</html>
