<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="Shortcut icon" href="../logo.ico" type="image/x-icon"/>
<title>疼痛</title>
<style>
  body {
    text-align: center;
    font-family: sans-serif;
    padding: 20px;
  }

  svg {
    width: 300px;
    margin: 20px auto;
    display: block;
  }

  .body-part {
    fill: #ccc;
    stroke: #555;
    stroke-width: 2;
    cursor: pointer;
    transition: fill 0.2s;
  }

  text {
    font-size: 25px;
    text-anchor: middle;
    fill: #333;
    pointer-events: none;
  }

  /* 疼痛程度臉譜區 */
  .pain-level-container {
    display: flex;
    flex-wrap: wrap; 
    justify-content: center;
    margin-top: 20px;
    gap: 20px;
  }

  .pain-face {
    font-size: 80px;
    cursor: pointer;
    transition: transform 0.2s, opacity 0.2s;
    opacity: 0.5;
    flex: 1 1 calc(16.66% - 20px); /* 默認每行最多6個（寬度自動） */
    max-width: 100px; /* 限制最大寬度 */
  }

  .pain-face.selected {
    transform: scale(1.2);
    opacity: 1;
  }

  @media (max-width: 1024px) { /* 平板，最多3個/行 */
    .pain-face {
      flex: 1 1 calc(33.33% - 20px);
    }
  }

  @media (max-width: 600px) { /* 手機，最多2個/行 */
    .pain-face {
      flex: 1 1 calc(50% - 20px);
    }
  }

  /* 疼痛分數表 */
  .pain-score-bar-container {
    width: 80%;
    max-width: 600px;
    margin: 15px auto 0 auto;
  }

  .pain-score-bar {
    width: 100%;
    height: 20px;
    background-color: #eee;
    border-radius: 10px;
    overflow: hidden;
    position: relative;
  }

  .pain-score-fill {
    height: 100%;
    width: 0%;
    background-color: #f44336;
    border-radius: 10px;
    transition: width 0.3s;
  }

  .pain-score-labels {
    display: flex;
    justify-content: space-between;
    margin-top: 5px;
    font-size: 14px;
    color: #333;
  }

  .pain-score-bar-wrapper {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px; /* 左右文字和長條間距 */
  width: 80%;
  max-width: 650px;
  margin: 15px auto 0 auto;
  }

  .pain-score-left,
  .pain-score-right {
    font-size: 16px;
    font-weight: bold;
    color: #333;
    width: 40px; /* 固定寬度對齊長條 */
    text-align: center;
  }

  /* 按鈕 */
  .button-container {
    display: flex;
    justify-content: space-between;
    margin-top: 30px;
    width: 100%;
    max-width: 400px;
    margin-left: auto;
    margin-right: auto;
    }

  .btn {
    flex: 1;
    padding: 20px;
    font-size: 20px;
    margin: 0 10px;
    border: none;
    border-radius: 15px;
    cursor: pointer;
    color: white;
    transition: transform 0.2s, background-color 0.2s;
    }

  .btn-back { background-color: #555; }
  .btn-back:hover { background-color: #333; }

  .btn-home { background-color: #4CAF50; }
  .btn-home:hover { background-color: #388E3C; }

  /* 懸停放大 */
  .btn:hover {
    transform: scale(1.05);
    }

  /* 點擊變色 */
  .btn:active {
    background-color: #222; 
    transform: scale(0.95); 
    }
</style>
</head>
<body>

<h1>選擇疼痛部位</h1>

<svg viewBox="0 0 300 830">
  <!-- 頭 -->
  <path class="body-part" style="fill:#ccc;" d="M150,15 a75,75 0 1,0 0,150 a75,75 0 1,0 0,-150" onclick="toggleRed(this)"/>
  <text x="150" y="100">頭</text>

  <!-- 胸 -->
  <rect class="body-part" style="fill:#ccc;" x="75" y="165" width="150" height="225" onclick="toggleRed(this)"/>
  <text x="150" y="280">胸</text>

  <!-- 腹部 -->
  <rect class="body-part" style="fill:#ccc;" x="75" y="390" width="150" height="180" onclick="toggleRed(this)"/>
  <text x="150" y="480">腹部</text>

  <!-- 左手 -->
  <rect class="body-part" style="fill:#ccc;" x="0" y="165" width="75" height="225" onclick="toggleRed(this)"/>
  <text x="37" y="280">左手</text>

  <!-- 右手 -->
  <rect class="body-part" style="fill:#ccc;" x="225" y="165" width="75" height="225" onclick="toggleRed(this)"/>
  <text x="262" y="280">右手</text>

  <!-- 左腿 -->
  <rect class="body-part" style="fill:#ccc;" x="75" y="570" width="60" height="225" onclick="toggleRed(this)"/>
  <text x="105" y="650">左腿</text>

  <!-- 右腿 -->
  <rect class="body-part" style="fill:#ccc;" x="165" y="570" width="60" height="225" onclick="toggleRed(this)"/>
  <text x="195" y="650">右腿</text>
</svg>

<h1>選擇疼痛程度</h1>
<!-- 疼痛程度選擇（六個表情） -->
<div class="pain-level-container">
  <div class="pain-face" data-level="不痛" onclick="selectPainLevel(this)">😄</div>
  <div class="pain-face" data-level="輕微" onclick="selectPainLevel(this)">🙂</div>
  <div class="pain-face" data-level="中等" onclick="selectPainLevel(this)">😐</div>
  <div class="pain-face" data-level="強" onclick="selectPainLevel(this)">😣</div>
  <div class="pain-face" data-level="極痛" onclick="selectPainLevel(this)">😫</div>
  <div class="pain-face" data-level="無法忍受" onclick="selectPainLevel(this)">😭</div>
</div>

<!-- 橫向疼痛分數條 -->
<div class="pain-score-bar-wrapper">
  <span class="pain-score-left">不痛</span>
  <div class="pain-score-bar-container">
    <div class="pain-score-bar">
      <div class="pain-score-fill" id="pain-score-fill"></div>
    </div>
    <div class="pain-score-labels">
      <span>0</span><span>1</span><span>2</span><span>3</span><span>4</span>
      <span>5</span><span>6</span><span>7</span><span>8</span><span>9</span><span>10</span>
    </div>
  </div>
  <span class="pain-score-right">痛</span>
</div>

<!-- 按鈕區 -->
<br>
<div class="button-container">
  <button class="btn btn-back" onclick="history.back()">返回上一頁</button>
  <button class="btn btn-home" onclick="window.location.href='../index.html'">返回首頁</button>
</div>

<script>
function toggleRed(elem){
  const currentColor = elem.style.fill;
  elem.style.fill = currentColor === 'red' ? '#ccc' : 'red';
}

function selectPainLevel(elem){
  if(elem.classList.contains('selected')){
    elem.classList.remove('selected');
    console.log("疼痛程度取消選擇");
  } else {
    document.querySelectorAll('.pain-face').forEach(face => face.classList.remove('selected'));
    elem.classList.add('selected');
    console.log("選擇疼痛程度:", elem.dataset.level);
  }
}

function selectPainLevel(elem){
  const allFaces = document.querySelectorAll('.pain-face');
  const fillBar = document.getElementById('pain-score-fill');

  if(elem.classList.contains('selected')){
    elem.classList.remove('selected');
    fillBar.style.width = '0%';
    console.log("疼痛程度取消選擇");
  } else {
    allFaces.forEach(face => face.classList.remove('selected'));
    elem.classList.add('selected');

    // 對應 0~10 分
    const scoreMap = {
      "不痛": 0,
      "輕微": 2,
      "中等": 5,
      "強": 7,
      "極痛": 9,
      "無法忍受": 10
    };

    const score = scoreMap[elem.dataset.level];
    fillBar.style.width = `${(score/10)*100}%`;
    console.log("選擇疼痛程度:", elem.dataset.level, "分數:", score);
  }
}

</script>

</body>
</html>
